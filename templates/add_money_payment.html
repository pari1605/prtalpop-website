{% extends "base.html" %}

{% block content %}

<div class="container mt-5 text-center">

    <h3 class="text-danger mb-3">Add Money</h3>

    <h5>Amount: ₹{{ amount }}</h5>

    <div class="card p-4 mt-4 shadow" style="max-width:350px; margin:auto; border-radius:15px;">

        <h5>Scan & Pay</h5>

        <img src="{{ url_for('static', filename='qr_wallet.png') }}" width="200" class="mt-3">

        <p class="mt-3 text-muted">
            Use GPay / PhonePe / Paytm
        </p>

        <a href="/add_money_success" class="btn btn-success mt-3">
            I Have Paid
        </a>

    </div>

</div>

{% endblock %}
