{% extends "base.html" %}

{% block content %}

<div class="container mt-5 text-center">

    <div class="card p-4 shadow" style="max-width:400px; margin:auto; border-radius:15px;">

        <h4 class="mb-3">Add Money 💰</h4>

        <form method="POST">

            <input type="number" name="amount" placeholder="Enter amount" class="form-control mb-3" required>

            <button class="btn btn-danger w-100">
                Proceed to Pay
            </button>

        </form>

    </div>

</div>

{% endblock %}
