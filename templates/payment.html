{% extends "base.html" %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">

    <div class="card shadow-lg p-4" style="width:420px; border-radius:20px;">

        <!-- HEADER -->
        <div class="text-center mb-3">
            <h3 class="fw-bold text-danger">PetalPop Payment</h3>
            <p class="text-muted mb-0">Order ID: {{ order_id }}</p>
        </div>

        <hr>

        <!-- AMOUNT SECTION -->
        <div class="text-center mb-3">
            <h1 class="fw-bold">₹{{ remaining }}</h1>
            <p class="text-muted">Amount to Pay</p>
        </div>

        <!-- BREAKDOWN -->
        <div class="mb-3" style="font-size:14px;">
            <div class="d-flex justify-content-between">
                <span>Total</span>
                <span>₹{{ total }}</span>
            </div>

            <div class="d-flex justify-content-between text-success">
                <span>Wallet Used</span>
                <span>- ₹{{ wallet_used }}</span>
            </div>

            <hr>

            <div class="d-flex justify-content-between fw-bold">
                <span>Payable</span>
                <span>₹{{ remaining }}</span>
            </div>
        </div>

        <!-- PAYMENT OPTIONS -->
        <div class="mb-3">

            <button class="btn btn-light w-100 mb-2 border" onclick="showUPI()">
                📱 Pay via UPI
            </button>

        </div>

        <!-- UPI SECTION -->
        <div id="upiSection" style="display:none;" class="text-center mt-3">

            <img src="{{ url_for('static', filename='qr.png') }}" width="200" class="mb-3">

            <p class="text-muted small">
                Scan using GPay / PhonePe / Paytm
            </p>

            <a href="/payment_success" class="btn btn-success w-100 mt-2">
                I Have Paid
            </a>

        </div>

    </div>

</div>

<!-- JS -->
<script>
    function showUPI() {
        document.getElementById("upiSection").style.display = "block";
    }

    function fakeCard() {
        alert("Demo Mode: Card payment not integrated yet");
    }

    function fakeNetbanking() {
        alert("Demo Mode: Net Banking not integrated yet");
    }
</script>

{% endblock %}
