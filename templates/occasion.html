{% extends "base.html" %}

{% block content %}



<!-- Page Title -->

<div class="container text-center mt-5">
    <h2>{{ occasion.capitalize() }} Special Bouquets</h2>
</div>

<!-- Products Grid -->

<div class="container mt-4">

    <div class="row text-center">

        {% for product in products %}

        <div class="col-md-3 col-sm-6 mb-4">

            <a href="{{ url_for('product', product_id=product.id) }}" style="text-decoration:none;color:black">

                <img src="{{ url_for('static', filename=product.image) }}" class="product-img">

                <p>{{ product.name }}</p>

                <p class="price">Rs {{ product.price }}/-</p>

            </a>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
